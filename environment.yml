# 本專案使用既有 conda 環境 sinotrade 開發
# 建立/更新：conda env update -n sinotrade -f environment.yml --prune
name: sinotrade
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pip:
      - shioaji>=1.3.3
      - streamlit>=1.40.0
      - plotly>=6.0.0
      - pandas>=3.0.0
      - python-dotenv>=1.0.0
      - requests>=2.32.0
